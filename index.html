<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Disney UI Replica</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="header__container">
    <h1 class="header__logo">Disney</h1>

    <nav class="header__nav">
      <a href="#">Shop</a>
      <a href="#">Disney+</a>
      <a href="#">Movies</a>
      <a href="#">Parks</a>
    </nav>

    <button class="btn btn--outline">Sign In</button>
  </div>
</header>

<main>

<!-- HERO -->
<section class="hero">
  <img src="img/banner-background.jpg" class="hero__bg" alt="Hero Background">

  <div class="hero__content">
    <img src="img/snow-white.png" class="hero__logo" alt="Snow White">

    <h2 class="hero__title">Magic Awaits</h2>
    <p class="hero__text">Discover stories that last forever</p>

    <button class="btn btn--red btn--pill">Watch Now</button>
  </div>
</section>

<!-- SHOP -->
<section class="shop">
  <h2 class="section__title">Shop</h2>

  <div class="grid grid--4">
    <article class="card">
      <img src="img/shop-image-1.jpg" alt="Shop Image 1">
    </article>
    <article class="card"><img src="img/shop-image-2.jpg" alt="Shop Image 2"></article>
    <article class="card"><img src="img/shop-image-3.jpg" alt="Shop Image 3"></article>
    <article class="card"><img src="img/shop-image-4.jpg" alt="Shop Image 4"></article>
  </div>
</section>

<!-- DISNEY PLUS -->
<section class="disney-plus">
  <h2 class="section__title">Explore Disney+</h2>

  <div class="grid grid--3">
    <article class="card"><img src="img/disney-plus-1.jpg" alt="Disney+ Image 1"></article>
    <article class="card"><img src="img/disney-plus-2.jpg" alt="Disney+ Image 2"></article>
    <article class="card"><img src="img/disney-plus-3.jpg" alt="Disney+ Image 3"></article>
  </div>
</section>

<!-- MOVIES -->
<section class="movies">
  <h2 class="section__title">Coming Soon</h2>

  <div class="grid grid--5">
    <article class="card"><img src="img/movies-1.jpg" alt="Movie 1"></article>
    <article class="card"><img src="img/movies-2.jpg" alt="Movie 2"></article>
    <article class="card"><img src="img/movies-3.jpg" alt="Movie 3"></article>
    <article class="card"><img src="img/movies-4.jpg" alt="Movie 4"></article>
    <article class="card"><img src="img/movies-5.jpg" alt="Movie 5"></article>
  </div>
</section>

<!-- PARKS -->
<section class="parks">
  <h2 class="section__title">Disney Parks</h2>

  <div class="grid grid--2">
    <article class="card"><img src="img/disney-parks-1.jpg" alt="Disney Park 1"></article>
    <article class="card"><img src="img/disney-parks-2.jpg" alt="Disney Park 2"></article>
  </div>
</section>

<!-- FOOTER BANNER -->
<section class="footer-banner">
  <img src="img/more-background.jpg" alt="More Magic">
</section>

</main>

<footer class="footer">
  <p>© Disney UI Clone</p>
</footer>

</body>
</html>
